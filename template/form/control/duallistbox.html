<div {$attributes}>{rows} 
  <select name="{$name}" id="{$id}" {$multiple} size="{$size}" {$disabled}>{row}
    <option value="{$value}" {$selected}>{$title}</option>
    {/row}
  </select>
  {empty}
  <select name="{$name}" id="{$id}" {$multiple} size="{$size}" {$disabled}>
    <option value="{$value}" {$selected}>{$no_records}</option>
  </select>
  {/empty}
  {/rows}
</div>
